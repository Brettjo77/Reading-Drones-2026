    <style>
      html, body { margin: 0; padding: 0; background: #faf6ec; font-family: Inter, system-ui, sans-serif; overflow-x: hidden; }
      :root { --rd-primary: #fcd34d; --rd-accent: #ef5a24; --rd-tint: #2aa7c8; --rd-nav-h: 76px; }
      @media (max-width: 768px) { :root { --rd-nav-h: 64px; } }
      #root { min-height: 100vh; }
      body::-webkit-scrollbar { width: 10px; }
      body::-webkit-scrollbar-thumb { background: rgba(0,0,0,.25); border-radius: 5px; }
      .cs-svc { transition: transform .2s ease, box-shadow .2s ease; }
      .cs-svc:hover { transform: rotate(0deg) translateY(-4px) !important; box-shadow: 12px 12px 0 #0d0d10 !important; }

      .cs-navlink { transition: background .15s ease, transform .15s ease; }

      .cs-navlink:focus-visible { outline: 3px solid #ef5a24; outline-offset: 3px; }
      a:focus-visible, button:focus-visible { outline: 3px solid #ef5a24; outline-offset: 2px; }

      /* Skip-to-main link \u2014 hidden until focused */
      .rd-skip-link {
        position: absolute; left: 8px; top: -100px;
        background: #fcd34d; color: #0d0d10;
        padding: 10px 14px; border: 2.5px solid #0d0d10; border-radius: 8px;
        font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-size: 13px;
        text-decoration: none; z-index: 1000;
        box-shadow: 3px 3px 0 #0d0d10;
      }
      .rd-skip-link:focus { top: 8px; }

      /* Honour reduced-motion at the platform level */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
      .cs-social { transition: transform .15s ease; }
      .cs-social:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #0d0d10 !important; }

      /* Social tiles — yellow variant (footer + homepage band) */
      .rd-social-tile:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 #0d0d10 !important;
      }
      .rd-social-tile:active {
        transform: translate(1px, 1px);
        box-shadow: 2px 2px 0 #0d0d10 !important;
      }
      .rd-social-tile:focus-visible {
        outline: 3px solid #ef5a24;
        outline-offset: 3px;
      }
      /* Social tiles — dark variant (Contact sidebar) */
      .rd-social-tile-dark:hover {
        background: rgba(252, 211, 77, 0.15) !important;
        transform: translate(-1px, -1px);
      }
      .rd-social-tile-dark:focus-visible {
        outline: 2px solid #fcd34d;
        outline-offset: 2px;
      }

      img { max-width: 100%; }

      /* ======================================================
         Mobile overrides — phones up to 768px wide.
         These force-collapse the desktop grid/typography by
         targeting common inline-style patterns. !important is
         required because the JSX uses inline styles.
         ====================================================== */
      @media (max-width: 768px) {
        /* Section padding — kill horizontal padding to give content room */
        section { padding-left: 20px !important; padding-right: 20px !important; }
        /* Reduce vertical padding too */
        section[style*="96px 48px"] { padding-top: 56px !important; padding-bottom: 56px !important; }
        section[style*="80px 48px"] { padding-top: 48px !important; padding-bottom: 48px !important; }
        section[style*="64px 48px"] { padding-top: 40px !important; padding-bottom: 40px !important; }

        /* Collapse all multi-column grids to single column */
        [style*="grid-template-columns"][style*="repeat(2"],
        [style*="grid-template-columns"][style*="repeat(3"],
        [style*="grid-template-columns"][style*="repeat(4"],
        [style*="gridTemplateColumns"][style*="repeat(2"],
        [style*="gridTemplateColumns"][style*="repeat(3"],
        [style*="gridTemplateColumns"][style*="repeat(4"],
        [style*="1fr 1fr"],
        [style*="1.1fr 1fr"], [style*="1fr 1.1fr"],
        [style*="1.2fr 1fr"], [style*="1fr 1.2fr"],
        [style*="1.4fr 1fr"], [style*="1fr 1.4fr"],
        [style*="1.5fr 1fr"], [style*="1fr 1.5fr"] {
          grid-template-columns: 1fr !important;
          gap: 20px !important;
        }

        /* Heroes: scale down giant headlines */
        h1 { font-size: clamp(36px, 11vw, 56px) !important; line-height: 1 !important; word-wrap: break-word; }
        h2 { font-size: clamp(28px, 8vw, 44px) !important; line-height: 1.05 !important; word-wrap: break-word; }
        h3 { font-size: clamp(18px, 5vw, 24px) !important; }

        /* Don't let -webkit-text-stroke explode at small sizes */
        h1 span, h2 span { -webkit-text-stroke-width: 2px !important; }

        /* Generous min-heights kill mobile — let content size itself */
        section[style*="min-height: 720"],
        section[style*="minHeight: 720"],
        section[style*="min-height: 700"],
        section[style*="minHeight: 700"] {
          min-height: 0 !important;
        }

        /* Fixed-width hero photo cards — let them go fluid */
        [style*="width: 360px"], [style*="width: 320px"] { width: 100% !important; max-width: 320px; }

        /* Tighten box paddings inside cards */
        [style*="padding: 40px 40px"] { padding: 24px !important; }
        [style*="padding: 36px"] { padding: 22px !important; }
        [style*="padding: 32px"] { padding: 20px !important; }
        [style*="padding: 28px"] { padding: 18px !important; }

        /* Shrink button gap so two buttons can sit side by side */
        [style*="display: flex"][style*="gap: 14"] { flex-wrap: wrap; gap: 10px !important; }

        /* Trust strip wrap nicely */
        [style*="gap: 48"] { gap: 16px !important; }

        /* Stop oversized box-shadows pushing layout */
        [style*="box-shadow: 12px 12px"] { box-shadow: 6px 6px 0 #0d0d10 !important; }
        [style*="boxShadow"][style*="12px 12px"] { box-shadow: 6px 6px 0 #0d0d10 !important; }

        /* Tilted hero photo cards: untilt slightly so they don't poke off-screen */
        [style*="rotate(3deg)"], [style*="rotate(-3deg)"],
        [style*="rotate(4deg)"], [style*="rotate(-4deg)"] {
          transform: none !important;
        }

        /* Absolutely positioned hero badges that hang off edges — bring back inside */
        [style*="right: -20"], [style*="right: -22"], [style*="right: -18"] { right: 0 !important; }
        [style*="left: -30"], [style*="left: -12"] { left: 0 !important; }
        [style*="bottom: -10"], [style*="top: -10"] { bottom: 0 !important; top: auto !important; }
      }

      /* HeroA stack: turn absolute pile into a simple 2-card column on mobile */
      @media (max-width: 768px) {
        .cs-hero-stack { height: auto !important; display: flex !important; flex-direction: column !important; gap: 16px; align-items: stretch; padding: 8px 0; }
        .cs-hero-stack .cs-hero-card { position: relative !important; left: auto !important; right: auto !important; top: auto !important; bottom: auto !important; width: 100% !important; height: 220px !important; transform: none !important; box-shadow: 6px 6px 0 #0d0d10 !important; }
        .cs-hero-stack .cs-hero-burst { position: relative !important; right: auto !important; bottom: auto !important; align-self: flex-end; margin-top: -20px; }
        .cs-hero-stack .cs-hero-mavic { display: none !important; }
      }

      /* Hide nav social tiles on narrow viewports — already shown in homepage band, footer, and Contact sidebar */
      @media (max-width: 900px) {
        .cs-nav-socials { display: none !important; }
      }

      /* Mobile nav: hamburger drawer */
      @media (max-width: 768px) {
        .cs-nav-header { padding: 14px 18px !important; }
        .cs-nav-burger { display: flex !important; }
        .cs-nav {
          position: fixed !important;
          top: 64px;
          left: 0;
          right: 0;
          flex-direction: column !important;
          align-items: stretch !important;
          background: #f4ede1;
          padding: 18px !important;
          gap: 8px !important;
          border-bottom: 4px solid #0d0d10;
          box-shadow: 0 8px 0 rgba(13,13,16,0.15);
          transform: translateY(-130%);
          transition: transform .25s ease;
          z-index: 40;
          max-height: calc(100vh - 64px);
          overflow-y: auto;
        }
        .cs-nav.cs-nav-open { transform: translateY(0); }
        .cs-nav .cs-navlink { font-size: 16px !important; padding: 14px 16px !important; }
        .cs-nav-quote { margin-left: 0 !important; margin-top: 6px; }
        .cs-nav-quote button { width: 100%; justify-content: center; }
      }

      @media (max-width: 480px) {
        /* Ultra-narrow tweak — keep most of the above and shrink a touch more */
        h1 { font-size: clamp(32px, 10vw, 44px) !important; }
        section { padding-left: 16px !important; padding-right: 16px !important; }
      }

      /* Noscript fallback styling */
      .rd-noscript { max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #0d0d10; }
      .rd-noscript h1 { font-family: 'Archivo Black', system-ui, sans-serif; font-size: 40px; margin: 0 0 12px; }
      .rd-noscript h2 { font-family: 'Archivo Black', system-ui, sans-serif; font-size: 24px; margin: 28px 0 8px; }
      .rd-noscript a { color: #ef5a24; }
    </style>
